<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahi Joshi — Fashion & Jewellery</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Quicksand:wght@300;400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pk:#e91e8c;--pk2:#ff6eb4;--pk3:#ffd700;
  --dark:#0c0008;--dark2:#170010;--dark3:#240015;
  --text:#fff;--text2:rgba(255,180,220,.75);--text3:rgba(255,180,220,.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--text);font-family:'Quicksand',sans-serif;overflow-x:hidden;cursor:none;}
#cur{width:13px;height:13px;background:#fff;border-radius:50%;position:fixed;pointer-events:none;z-index:9999;mix-blend-mode:difference;transform:translate(-50%,-50%);}
#cur2{width:36px;height:36px;border:2px solid rgba(233,30,140,.5);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .08s,top .08s;}
.spk{position:fixed;pointer-events:none;z-index:9997;font-size:.9rem;animation:spka .7s ease forwards;}
@keyframes spka{0%{opacity:1;transform:scale(0) translateY(0)}60%{opacity:1;transform:scale(1.4) translateY(-20px)}100%{opacity:0;transform:scale(.3) translateY(-44px)}}

/* ─── BACK BTN ─── */
.back-btn{position:fixed;top:18px;left:18px;z-index:500;padding:9px 20px;border-radius:50px;border:2px solid var(--pk);color:var(--pk);background:rgba(233,30,140,.1);font-family:'Quicksand',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:2px;cursor:pointer;transition:all .3s;backdrop-filter:blur(12px);}
.back-btn:hover{background:var(--pk);color:#fff;box-shadow:0 0 24px rgba(233,30,140,.5);}

/* ─── HERO ─── */
.hero{min-height:100vh;background:linear-gradient(160deg,var(--dark) 0%,#1e0012 35%,#380020 65%,#1e0012 100%);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 20px 80px;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 40%,rgba(233,30,140,.35) 0%,transparent 55%),radial-gradient(ellipse at 80% 60%,rgba(255,110,180,.2) 0%,transparent 55%);}
.hero-name{font-family:'Dancing Script',cursive;font-size:clamp(4.5rem,12vw,9rem);color:transparent;background:linear-gradient(135deg,#ffb3d9,#ffd700,#ff6eb4,#e91e8c,#ffb3d9);background-size:300% 300%;-webkit-background-clip:text;background-clip:text;position:relative;z-index:2;animation:nameShimmer 4s ease infinite,fadeUp .8s ease both;filter:drop-shadow(0 0 30px rgba(233,30,140,.5));}
@keyframes nameShimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.hero-tag{color:rgba(255,180,220,.7);font-size:clamp(.8rem,2vw,1.1rem);letter-spacing:5px;text-transform:uppercase;margin-top:10px;position:relative;z-index:2;animation:fadeUp .8s .2s ease both;}
.hero-stats{display:flex;gap:20px;margin-top:44px;flex-wrap:wrap;justify-content:center;position:relative;z-index:2;animation:fadeUp .8s .35s ease both;}
.stat-box{background:rgba(233,30,140,.08);border:1px solid rgba(233,30,140,.22);border-radius:14px;padding:16px 26px;text-align:center;}
.stat-num{font-size:1.4rem;font-weight:700;color:var(--pk3);}
.stat-label{color:var(--text3);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;margin-top:3px;}

/* Floating flowers */
.flower{position:absolute;pointer-events:none;opacity:0;animation:floatUp linear infinite;}
@keyframes floatUp{0%{opacity:0;transform:translateY(100vh) rotate(0deg)}10%{opacity:.7}88%{opacity:.3}100%{opacity:0;transform:translateY(-80px) rotate(720deg)}}

/* ─── STICKY NAV ─── */
.sticky-nav{position:sticky;top:0;z-index:100;background:rgba(12,0,8,.88);backdrop-filter:blur(24px);border-bottom:1px solid rgba(233,30,140,.18);padding:0 24px;}
.nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:14px 0;flex-wrap:wrap;}
.nav-logo{font-family:'Dancing Script',cursive;color:var(--pk);font-size:1.4rem;margin-right:auto;}
.search-bar{flex:1;min-width:180px;max-width:360px;position:relative;}
.search-bar input{width:100%;padding:9px 16px 9px 40px;background:rgba(233,30,140,.07);border:1px solid rgba(233,30,140,.22);border-radius:50px;color:#fff;font-family:'Quicksand',sans-serif;font-size:.85rem;outline:none;transition:all .3s;}
.search-bar input::placeholder{color:rgba(255,180,220,.35);}
.search-bar input:focus{border-color:var(--pk);box-shadow:0 0 16px rgba(233,30,140,.2);}
.search-bar .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.9rem;}
.wishlist-btn{position:relative;padding:9px 18px;border-radius:50px;border:2px solid rgba(233,30,140,.4);background:transparent;color:var(--pk2);font-family:'Quicksand',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;transition:all .3s;letter-spacing:1px;}
.wishlist-btn:hover{background:var(--pk);border-color:var(--pk);color:#fff;}
.wcount{position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:var(--pk3);border-radius:50%;color:#000;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ─── CATEGORY TABS ─── */
.cat-tabs{display:flex;gap:10px;padding:20px 24px 0;max-width:1400px;margin:0 auto;flex-wrap:wrap;}
.tab{padding:10px 22px;border-radius:50px;border:2px solid rgba(233,30,140,.25);color:var(--text3);background:transparent;font-family:'Quicksand',sans-serif;font-weight:600;font-size:.82rem;cursor:pointer;transition:all .3s;letter-spacing:.5px;}
.tab:hover,.tab.active{background:var(--pk);border-color:var(--pk);color:#fff;box-shadow:0 4px 20px rgba(233,30,140,.35);transform:translateY(-2px);}

/* Sort bar */
.sort-bar{display:flex;align-items:center;gap:14px;padding:18px 24px 10px;max-width:1400px;margin:0 auto;flex-wrap:wrap;}
.sort-label{color:var(--text3);font-size:.8rem;letter-spacing:1px;}
.sort-btn{padding:6px 16px;border-radius:20px;border:1px solid rgba(233,30,140,.2);background:transparent;color:var(--text2);font-family:'Quicksand',sans-serif;font-size:.78rem;cursor:pointer;transition:all .3s;}
.sort-btn:hover,.sort-btn.active{background:rgba(233,30,140,.15);border-color:var(--pk);color:#fff;}
.result-count{margin-left:auto;color:var(--text3);font-size:.8rem;}

/* ─── PRODUCT GRID ─── */
.grid-wrap{padding:20px 24px 60px;max-width:1400px;margin:0 auto;}
.p-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:24px;}

.p-card{background:rgba(255,255,255,.025);border:1px solid rgba(233,30,140,.1);border-radius:18px;overflow:hidden;transition:all .4s cubic-bezier(.23,1,.32,1);cursor:pointer;}
.p-card:hover{transform:translateY(-8px) scale(1.015);border-color:rgba(233,30,140,.4);box-shadow:0 20px 50px rgba(233,30,140,.18);}
.p-card.hidden{display:none;}

.p-img{width:100%;aspect-ratio:3/3.5;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.p-img-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem;transition:transform .5s ease;}
.p-card:hover .p-img-inner{transform:scale(1.08);}

.badge{position:absolute;top:12px;left:12px;padding:4px 12px;border-radius:20px;font-size:.67rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.badge-new{background:#e91e8c;color:#fff;}
.badge-sale{background:#ff6f00;color:#fff;}
.badge-hot{background:#d50000;color:#fff;}
.badge-best{background:#7c4dff;color:#fff;}
.badge-trend{background:#00897b;color:#fff;}

.wish-icon{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .3s;transform:scale(0);box-shadow:0 2px 10px rgba(0,0,0,.2);}
.p-card:hover .wish-icon{transform:scale(1);}
.wish-icon.loved{transform:scale(1)!important;background:#ff4d6d;animation:heartPop .3s ease;}
@keyframes heartPop{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

.p-info{padding:14px 16px 18px;}
.p-name{color:#fff;font-weight:600;font-size:.88rem;line-height:1.35;margin-bottom:8px;}
.p-price{color:var(--pk2);font-size:1.05rem;font-weight:700;}
.p-orig{color:rgba(255,255,255,.28);font-size:.76rem;text-decoration:line-through;margin-left:7px;font-weight:400;}
.p-disc{color:#76c442;font-size:.75rem;font-weight:700;margin-left:5px;}
.p-stars{display:flex;align-items:center;gap:5px;margin-top:7px;}
.stars-txt{color:#ffd700;font-size:.8rem;}
.rating-num{color:rgba(255,255,255,.4);font-size:.75rem;}
.reviews{color:rgba(255,255,255,.3);font-size:.72rem;}
.add-btn{width:100%;margin-top:12px;padding:10px;background:linear-gradient(135deg,var(--pk),#c2185b);border:none;border-radius:10px;color:#fff;font-family:'Quicksand',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:.5px;cursor:pointer;transition:all .3s;text-transform:uppercase;}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(233,30,140,.4);}
.add-btn.added{background:linear-gradient(135deg,#43a047,#2e7d32);}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:linear-gradient(145deg,#170010,#280018);border:1px solid rgba(233,30,140,.25);border-radius:24px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;animation:modalIn .35s cubic-bezier(.23,1,.32,1) both;}
@keyframes modalIn{from{transform:scale(.88) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal-body{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.modal-img{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:7rem;background:rgba(233,30,140,.05);border-radius:24px 0 0 24px;}
.modal-info{padding:30px 28px;}
.modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:1.1rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--pk);}
.modal-name{font-family:'Playfair Display',serif;font-size:1.4rem;color:#fff;margin-bottom:8px;line-height:1.3;}
.modal-price{font-size:1.5rem;font-weight:700;color:var(--pk2);margin:10px 0;}
.modal-desc{color:rgba(255,180,220,.6);font-size:.85rem;line-height:1.6;margin-bottom:20px;}
.modal-sizes{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.size-btn{padding:7px 16px;border-radius:8px;border:1px solid rgba(233,30,140,.3);background:transparent;color:var(--text2);font-family:'Quicksand',sans-serif;font-size:.8rem;cursor:pointer;transition:all .3s;}
.size-btn:hover,.size-btn.sel{background:var(--pk);border-color:var(--pk);color:#fff;}
.modal-add-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--pk),#c2185b);border:none;border-radius:12px;color:#fff;font-family:'Quicksand',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .3s;text-transform:uppercase;letter-spacing:1px;margin-top:8px;}
.modal-add-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(233,30,140,.45);}
@media(max-width:600px){
  .modal-body{grid-template-columns:1fr;}
  .modal-img{border-radius:24px 24px 0 0;font-size:5rem;}
}

/* ─── WISHLIST PANEL ─── */
.wl-panel{position:fixed;top:0;right:0;bottom:0;width:340px;max-width:100vw;background:linear-gradient(160deg,#170010,#240018);border-left:1px solid rgba(233,30,140,.2);z-index:700;transform:translateX(100%);transition:transform .4s cubic-bezier(.23,1,.32,1);padding:80px 20px 20px;overflow-y:auto;}
.wl-panel.open{transform:translateX(0);}
.wl-title{font-family:'Dancing Script',cursive;font-size:1.8rem;color:var(--pk);margin-bottom:20px;}
.wl-item{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(233,30,140,.06);border:1px solid rgba(233,30,140,.12);border-radius:12px;margin-bottom:10px;}
.wl-emoji{font-size:2rem;width:50px;text-align:center;}
.wl-iname{color:#fff;font-size:.82rem;font-weight:600;flex:1;line-height:1.3;}
.wl-iprice{color:var(--pk2);font-size:.85rem;font-weight:700;}
.wl-rm{background:none;border:none;color:rgba(255,180,220,.4);font-size:1rem;cursor:pointer;transition:color .2s;flex-shrink:0;}
.wl-rm:hover{color:#ff4d6d;}
.wl-empty{color:var(--text3);text-align:center;padding:40px 0;font-size:.9rem;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,var(--pk),#c2185b);color:#fff;padding:12px 22px;border-radius:14px;font-weight:600;font-size:.88rem;z-index:9000;transform:translateY(80px);transition:transform .4s cubic-bezier(.23,1,.32,1);box-shadow:0 10px 30px rgba(233,30,140,.4);}
.toast.show{transform:translateY(0);}

/* FOOTER */
.footer{background:#0c0008;border-top:1px solid rgba(233,30,140,.15);padding:50px 24px;text-align:center;}
.footer-name{font-family:'Dancing Script',cursive;font-size:2.5rem;color:var(--pk);margin-bottom:8px;}
.footer p{color:rgba(255,180,220,.3);font-size:.82rem;letter-spacing:1px;}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:var(--pk);border-radius:3px;}
@media(max-width:768px){
  .p-grid{grid-template-columns:repeat(2,1fr);gap:14px;}
  .grid-wrap{padding:14px 12px 40px;}
  .cat-tabs{padding:14px 12px 0;}
  .sort-bar{padding:12px 12px 6px;}
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur2"></div>

<button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
<div class="toast" id="toast">✨ Added to wishlist!</div>

<!-- WISHLIST PANEL -->
<div class="wl-panel" id="wlPanel">
  <div class="wl-title">💕 My Wishlist</div>
  <div id="wlItems"><div class="wl-empty">Your wishlist is empty 🌸<br>Start adding some pieces!</div></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal" style="position:relative;" id="modalBox">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- HERO -->
<div class="hero" id="hero">
  <div id="flowerBg"></div>
  <div class="hero-name">Mahi Joshi</div>
  <div class="hero-tag">✨ Where every look tells a story ✨</div>
  <div class="hero-stats">
    <div class="stat-box"><div class="stat-num">💍 200+</div><div class="stat-label">Jewellery</div></div>
    <div class="stat-box"><div class="stat-num">👗 180+</div><div class="stat-label">Outfits</div></div>
    <div class="stat-box"><div class="stat-num">⭐ 4.9</div><div class="stat-label">Rating</div></div>
    <div class="stat-box"><div class="stat-num">💕 Free</div><div class="stat-label">Wishlist</div></div>
  </div>
  <div style="margin-top:36px;position:relative;z-index:2;">
    <a href="#shop" style="padding:13px 34px;background:linear-gradient(135deg,#e91e8c,#c2185b);border-radius:50px;color:#fff;text-decoration:none;font-weight:700;font-size:.9rem;letter-spacing:2px;box-shadow:0 0 30px rgba(233,30,140,.4);display:inline-block;transition:all .3s;" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">Shop Now 🌸</a>
  </div>
</div>

<!-- STICKY NAV -->
<div class="sticky-nav" id="shop">
  <div class="nav-inner">
    <div class="nav-logo">Mahi Joshi 🌸</div>
    <div class="search-bar">
      <span class="si">🔍</span>
      <input type="text" id="searchInput" placeholder="Search jewellery, kurtis, dresses..." oninput="filterProducts()">
    </div>
    <button class="wishlist-btn" onclick="toggleWL()">
      💕 Wishlist <span class="wcount" id="wcount">0</span>
    </button>
  </div>
</div>

<!-- CATEGORY TABS -->
<div style="background:var(--dark2);padding-bottom:4px;">
  <div class="cat-tabs" id="catTabs">
    <button class="tab active" data-cat="all" onclick="filterCat('all',this)">✨ All</button>
    <button class="tab" data-cat="jewellery" onclick="filterCat('jewellery',this)">💍 Jewellery</button>
    <button class="tab" data-cat="kurti" onclick="filterCat('kurti',this)">👘 Kurtis</button>
    <button class="tab" data-cat="dress" onclick="filterCat('dress',this)">👗 Dresses</button>
    <button class="tab" data-cat="accessories" onclick="filterCat('accessories',this)">👜 Accessories</button>
  </div>
  <div class="sort-bar">
    <span class="sort-label">Sort:</span>
    <button class="sort-btn active" onclick="sortProducts('default',this)">Default</button>
    <button class="sort-btn" onclick="sortProducts('low',this)">Price ↑</button>
    <button class="sort-btn" onclick="sortProducts('high',this)">Price ↓</button>
    <button class="sort-btn" onclick="sortProducts('rating',this)">Top Rated</button>
    <span class="result-count" id="resultCount">Showing all products</span>
  </div>
</div>

<!-- PRODUCT GRID -->
<div class="grid-wrap">
  <div class="p-grid" id="grid"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-name">Mahi Joshi 💕</div>
  <p>Curated with love • Styled for you</p>
</div>

<script>
// Cursor
const cur=document.getElementById('cur'),cur2=document.getElementById('cur2');
document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';
  setTimeout(()=>{cur2.style.left=e.clientX+'px';cur2.style.top=e.clientY+'px';},70);
});
document.addEventListener('click',e=>{
  const spks=['✨','🌸','💕','⭐','💫'];
  const el=document.createElement('div');el.className='spk';
  el.textContent=spks[Math.floor(Math.random()*spks.length)];
  el.style.left=e.clientX-10+'px';el.style.top=e.clientY-10+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),700);
});

// Floating flowers hero
const fb=document.getElementById('flowerBg');
['🌸','🌺','🌹','🌷','💐','🌼','✿','❀'].forEach((f,i)=>{
  const el=document.createElement('div');el.className='flower';
  el.textContent=f;
  el.style.cssText=`left:${5+i*12}%;font-size:${1+Math.random()*.8}rem;animation-duration:${12+i*2}s;animation-delay:${i*1.3}s;`;
  fb.appendChild(el);
});

// ── PRODUCT DATA ──
// Colors for gradient backgrounds
const gradients = {
  jewellery: ['linear-gradient(135deg,#2c0018,#5c0030)','linear-gradient(135deg,#1a001a,#400040)','linear-gradient(135deg,#1c0c00,#4a2000)','linear-gradient(135deg,#14001a,#380040)'],
  kurti:['linear-gradient(135deg,#001830,#003060)','linear-gradient(135deg,#001a10,#003820)','linear-gradient(135deg,#1c0010,#420025)','linear-gradient(135deg,#100018,#280038)'],
  dress:['linear-gradient(135deg,#0c0020,#28004a)','linear-gradient(135deg,#001c18,#004040)','linear-gradient(135deg,#1a0800,#401500)','linear-gradient(135deg,#001018,#002838)'],
  accessories:['linear-gradient(135deg,#180014,#3c0030)','linear-gradient(135deg,#001410,#003020)','linear-gradient(135deg,#1a1000,#402200)']
};

const products = [
  // JEWELLERY
  {id:1,cat:'jewellery',name:'Kundan Polki Gold Necklace Set',emoji:'💛',price:899,orig:1499,rating:4.9,reviews:342,badge:'best',desc:'Handcrafted Kundan Polki necklace with matching earrings. Perfect for weddings and festivals. Available in multiple sizes.',sizes:['S','M','L'],bg:gradients.jewellery[0]},
  {id:2,cat:'jewellery',name:'Oxidised Silver Jhumka Earrings',emoji:'🪙',price:349,orig:599,rating:4.7,reviews:218,badge:'hot',desc:'Traditional oxidised silver jhumka earrings with intricate detailing. Lightweight and comfortable for all-day wear.',sizes:['One Size'],bg:gradients.jewellery[1]},
  {id:3,cat:'jewellery',name:'Meenakari Choker Necklace',emoji:'🌺',price:1099,orig:1799,rating:4.8,reviews:189,badge:'new',desc:'Vibrant Meenakari work choker with peacock motifs. Gold-plated base with enamel work in traditional patterns.',sizes:['One Size'],bg:gradients.jewellery[2]},

let wishlist = [];
let currentCat = 'all';
let currentSort = 'default';
let searchTerm = '';
let selectedSizes = {};

// ── RENDER ──
function render(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let items = products.filter(p => {
    const matchCat = currentCat === 'all' || p.cat === currentCat;
    const matchSearch = p.name.toLowerCase().includes(searchTerm.toLowerCase());
    return matchCat && matchSearch;
  });
  if(currentSort === 'low') items.sort((a,b)=>a.price-b.price);
  else if(currentSort === 'high') items.sort((a,b)=>b.price-a.price);
  else if(currentSort === 'rating') items.sort((a,b)=>b.rating-a.rating);

  document.getElementById('resultCount').textContent = `Showing ${items.length} products`;

  if(items.length === 0){
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text3);">No products found 🌸 Try a different search!</div>`;
    return;
  }

  items.forEach((p,i) => {
    const disc = Math.round((1-p.price/p.orig)*100);
    const inWL = wishlist.some(w=>w.id===p.id);
    const badgeHtml = p.badge ? `<div class="badge badge-${p.badge}">${p.badge}</div>` : '';
    const starsHtml = '★'.repeat(Math.floor(p.rating)) + (p.rating%1>=0.5?'½':'');
    grid.innerHTML += `
    <div class="p-card" id="card-${p.id}" style="animation:fadeUp .5s ${i*.04}s ease both;">
      <div class="p-img" style="background:${p.bg};">
        <div class="p-img-inner">${p.emoji}</div>
        ${badgeHtml}
        <button class="wish-icon ${inWL?'loved':''}" id="wbtn-${p.id}" onclick="toggleWish(${p.id},event)" title="Wishlist">
          ${inWL?'❤️':'🤍'}
        </button>
      </div>
      <div class="p-info">
        <div class="p-name" onclick="openModal(${p.id})">${p.name}</div>
        <div>
          <span class="p-price">₹${p.price.toLocaleString()}</span>
          <span class="p-orig">₹${p.orig.toLocaleString()}</span>
          <span class="p-disc">${disc}% off</span>
        </div>
        <div class="p-stars">
          <span class="stars-txt">${starsHtml}</span>
          <span class="rating-num">${p.rating}</span>
          <span class="reviews">(${p.reviews})</span>
        </div>
        <button class="add-btn" id="abtn-${p.id}" onclick="addToWishlist(${p.id})">
          🛍️ Add to Wishlist
        </button>
      </div>
    </div>`;
  });
}

function filterCat(cat, btn){
  currentCat = cat;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function filterProducts(){ searchTerm = document.getElementById('searchInput').value; render(); }
function sortProducts(s,btn){
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── WISHLIST ──
function toggleWish(id, e){
  if(e) e.stopPropagation();
  const idx = wishlist.findIndex(w=>w.id===id);
  if(idx >= 0) wishlist.splice(idx,1);
  else { const p=products.find(p=>p.id===id); if(p) wishlist.push(p); }
  updateWLCount();
  render();
  renderWLPanel();
}
function addToWishlist(id){
  const p = products.find(p=>p.id===id);
  if(!p) return;
  if(!wishlist.some(w=>w.id===id)){
    wishlist.push(p);
    updateWLCount();
    renderWLPanel();
  }
  const btn = document.getElementById('abtn-'+id);
  if(btn){ btn.textContent='✅ In Wishlist'; btn.classList.add('added'); }
  showToast('💕 Added: '+p.name.slice(0,30)+'...');
  setTimeout(()=>{render();},1500);
}
function updateWLCount(){ document.getElementById('wcount').textContent = wishlist.length; }

function toggleWL(){
  document.getElementById('wlPanel').classList.toggle('open');
}
function renderWLPanel(){
  const el = document.getElementById('wlItems');
  if(wishlist.length === 0){ el.innerHTML='<div class="wl-empty">Your wishlist is empty 🌸<br>Start adding some pieces!</div>'; return; }
  el.innerHTML = wishlist.map(p=>`
    <div class="wl-item">
      <div class="wl-emoji">${p.emoji}</div>
      <div>
        <div class="wl-iname">${p.name}</div>
        <div class="wl-iprice">₹${p.price.toLocaleString()}</div>
      </div>
      <button class="wl-rm" onclick="toggleWish(${p.id})">✕</button>
    </div>`).join('');
}

// ── MODAL ──
function openModal(id){
  const p = products.find(p=>p.id===id);
  if(!p) return;
  const disc = Math.round((1-p.price/p.orig)*100);
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-img" style="background:${p.bg};">${p.emoji}</div>
    <div class="modal-info">
      ${p.badge ? `<span class="badge badge-${p.badge}" style="margin-bottom:10px;display:inline-block;">${p.badge.toUpperCase()}</span>` : ''}
      <div class="modal-name">${p.name}</div>
      <div style="color:rgba(255,180,220,.5);font-size:.78rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">${p.cat.toUpperCase()}</div>
      <div class="modal-price">₹${p.price.toLocaleString()} <span style="font-size:.85rem;color:rgba(255,255,255,.3);text-decoration:line-through;font-weight:400;">₹${p.orig.toLocaleString()}</span> <span style="font-size:.78rem;color:#76c442;font-weight:700;">${disc}% OFF</span></div>
      <div class="modal-desc">${p.desc}</div>
      <div style="color:var(--text3);font-size:.78rem;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">Select Size</div>
      <div class="modal-sizes">${p.sizes.map((s,i)=>`<button class="size-btn ${i===0?'sel':''}" onclick="selectSize(this)">${s}</button>`).join('')}</div>
      <button class="modal-add-btn" onclick="addToWishlist(${p.id});closeModal();">💕 Add to Wishlist</button>
    </div>`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
function selectSize(btn){ btn.closest('.modal-sizes').querySelectorAll('.size-btn').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target===document.getElementById('modal')) closeModal(); });

// ── TOAST ──
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

// Init
render();
</script>

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
